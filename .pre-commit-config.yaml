# Prevent secrets and large data files from ever being committed.
# Enable once per clone:  pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]  # blocks accidental raw-data / model dumps
      - id: end-of-file-fixer
      - id: trailing-whitespace
