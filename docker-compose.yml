version: '3.8'

services:
  # ==========================================================================
  # Production Service
  # ==========================================================================
  calmsense:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calmsense-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models/trained:/app/models/trained:ro
      - ./outputs:/app/outputs
    environment:
      - MODEL_PATH=/app/models/trained
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - calmsense-network

  # ==========================================================================
  # Development Services (use with
  # ==========================================================================

networks:
  calmsense-network:
    driver: bridge

volumes:
  model-data:
  output-data:
