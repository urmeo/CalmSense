services:
  # ==========================================================================
  # Production Service
  # ==========================================================================
  calmsense:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calmsense-app
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs:ro
    environment:
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - calmsense-network

networks:
  calmsense-network:
    driver: bridge
