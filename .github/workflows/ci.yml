name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/ scripts/
      - name: Ruff format check
        run: ruff format --check src/ tests/ scripts/
      - name: mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install pytest-cov
      - name: Run tests with coverage
        run: pytest tests/ -q --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=60
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Audit installed dependencies (blocking)
        # Ignored IDs are all onnx untrusted-model-loading CVEs (fixed in onnx 1.21). We
        # load only our own committed model, and onnx is version-locked to onnxruntime-web
        # 1.19.2 for browser parity; revisit when bumping to onnx>=1.21. Any other CVE fails CI.
        run: |
          pip-audit --desc \
            --ignore-vuln PYSEC-2026-104 \
            --ignore-vuln PYSEC-2026-103 \
            --ignore-vuln CVE-2026-34446 \
            --ignore-vuln GHSA-q56x-g2fj-4rj6 \
            --ignore-vuln CVE-2026-27489 \
            --ignore-vuln CVE-2026-34445

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # scan full history, not just the tip commit
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps  # switch to `npm ci` once package-lock.json is committed
      - name: Build
        working-directory: frontend
        env:
          CI: false  # CRA treats warnings as errors under CI; match the Pages deploy
        run: npm run build

  clean-clone:
    name: Clean-clone smoke (pip install -e . -> demo)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the advertised way (pyproject only, no requirements.txt)
        # Catches dependency-resolution regressions a stranger would hit, e.g. an
        # unpinned scipy pulling a version that dropped scipy.signal.daub.
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: make demo (offline synthetic pipeline)
        run: make demo
